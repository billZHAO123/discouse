<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预约登记 - 代码审查</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 480px; margin: 0 auto; }
        fieldset { margin: 16px 0; border: 1px solid #ccc; }
        label { display: inline-block; margin: 8px 0; }
        input, select, button { margin-right: 8px; }
        #shareLink { word-break: break-all; color: #06c; }
    </style>
</head>
<body>
    <h1>参会预约</h1>
    <p>故意包含多种典型问题，单文件即可打开。这是代码评审练习演示页面，用于演示常见前端代码问题。</p>

    <fieldset>
        <legend>基本信息</legend>
        <label>姓名 <input type="text" id="fullName"></label><br>
        <label>城市 <input type="text" id="city"></label><br>
        <label><input type="checkbox" id="agree" value="yes"> 我已阅读须知</label><br>
        <button type="button" id="btnSubmit">提交预约</button>
        <p id="msg"></p>
    </fieldset>

    <fieldset>
        <legend>生成分享链接</legend>
        <button type="button" id="btnShare">复制预约链接</button>
        <p id="shareLink"></p>
        <p id="copyMsg" style="display: none; color: #2ecc71; font-size: 14px;"></p>
    </fieldset>

    <fieldset>
        <legend>已选时段（用 for-in 遍历演示）</legend>
        <div id="slotsOut"></div>
        <button type="button" id="btnSlots">列出时段</button>
    </fieldset>

    <script>
        const slots = ['09:00', '11:00', '14:00'];

        document.getElementById('btnSubmit').addEventListener('click', function() {
            const name = document.getElementById('fullName').value.trim();
            const msgEl = document.getElementById('msg');
            
            // 添加非空校验
            if (!name) {
                msgEl.textContent = '请输入姓名';
                return;
            }

            // 修复：使用checked状态代替value判断
            const ok = document.getElementById('agree').checked;
            if (!ok) {
                msgEl.textContent = '请先勾选须知';
                return;
            }
            const token = Math.floor(Math.random() * 1e6);
            // 修复XSS风险：使用textContent代替innerHTML，避免用户输入注入
            msgEl.textContent = '预约成功，姓名：' + name + '，令牌：' + token;
        });

        document.getElementById('btnShare').addEventListener('click', async function() {
            const city = document.getElementById('city').value.trim();
            const base = 'https://example.com/join?city=' + encodeURIComponent(city) + '&ref=demo';
            const shareEl = document.getElementById('shareLink');
            const copyMsgEl = document.getElementById('copyMsg');
            shareEl.textContent = base;

            // 添加实际复制功能和用户反馈
            try {
                await navigator.clipboard.writeText(base);
                copyMsgEl.textContent = '链接已复制到剪贴板 ✓';
                copyMsgEl.style.display = 'block';
                setTimeout(() => {
                    copyMsgEl.style.display = 'none';
                }, 3000);
            } catch (e) {
                copyMsgEl.textContent = '请手动复制上方链接';
                copyMsgEl.style.display = 'block';
                copyMsgEl.style.color = '#e74c3c';
            }
        });

        // 移除了原型污染：删除Array.prototype扩展代码

        document.getElementById('btnSlots').addEventListener('click', function() {
            const out = document.getElementById('slotsOut');
            let html = '';
            // 修复for-in遍历数组问题，改用for-of遍历数组，同时优化DOM操作减少重排
            for (const [index, slot] of slots.entries()) {
                html += `<p>时段 ${index}: ${slot}</p>`;
            }
            // 一次性插入DOM，减少重排次数
            out.innerHTML = html;
        });
    </script>
</body>
</html>
