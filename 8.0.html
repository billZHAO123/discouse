<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典 BUG 演示（修复版）</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 560px; margin: 0 auto; }
        .box { border: 1px solid #ccc; padding: 16px; margin: 12px 0; border-radius: 8px; }
        input, button { padding: 8px; margin: 4px 0; }
    </style>
</head>
<body>
    <h1>经典 BUG 演示</h1>
    <p>打开即用，原BUG已修复，供代码审查练习参考。</p>

    <div class="box">
        <h2>欢迎语（XSS修复）</h2>
        <input type="text" id="nameInput" placeholder="输入昵称">
        <button type="button" id="greetBtn">生成欢迎</button>
        <div id="greetOut"></div>
    </div>

    <div class="box">
        <h2>计算器（== 与类型修复）</h2>
        <input type="text" id="a" value="5">
        <input type="text" id="b" value="3">
        <button type="button" id="sumBtn">相加</button>
        <div id="sumOut"></div>
    </div>

    <div class="box">
        <h2>脚本计算（安全修复）</h2>
        <input type="text" id="expr" placeholder="输入数值表达式，如 2+3*4">
        <button type="button" id="evalBtn">计算</button>
        <div id="exprOut"></div>
    </div>

    <div class="box">
        <h2>列表数据</h2>
        <button type="button" id="loadBtn">加载列表</button>
        <ul id="listOut"></ul>
    </div>

    <div class="box">
        <h2>定时提醒</h2>
        <input type="text" id="remindText" placeholder="提醒内容（将显示在下方）">
        <button type="button" id="startRemind">启动每 3 秒刷新提醒</button>
        <div id="remindBanner" style="margin-top:8px;min-height:24px;"></div>
    </div>

    <script>
        /* 修复BUG 1: innerHTML直接拼接用户输入 → XSS，改用textContent处理用户输入 */
        document.getElementById('greetBtn').onclick = function() {
            const n = document.getElementById('nameInput').value;
            const p = document.createElement('p');
            p.textContent = `你好，${n}！`;
            const greetOut = document.getElementById('greetOut');
            greetOut.innerHTML = '';
            greetOut.appendChild(p);
        };

        /* 修复BUG 2: ==导致字符串拼接而非数字相加 → 转数值后用===判断 */
        document.getElementById('sumBtn').onclick = function() {
            const aVal = document.getElementById('a').value;
            const bVal = document.getElementById('b').value;
            const a = Number(aVal);
            const b = Number(bVal);
            if (a === b) {
                document.getElementById('sumOut').textContent = '相等，不计算';
            } else {
                document.getElementById('sumOut').textContent = `结果: ${a + b}`;
            }
        };

        /* 修复BUG 3: eval执行任意字符串 → 白名单校验后安全计算，禁止直接执行任意代码 */
        document.getElementById('evalBtn').onclick = function() {
            const e = document.getElementById('expr').value;
            const exprOut = document.getElementById('exprOut');
            // 仅允许数字和+-*/() 运算符的白名单
            if (!/^[\d+\-*/().\s]+$/.test(e)) {
                exprOut.textContent = '错误：仅允许输入数值和 +-*/ 运算符';
                return;
            }
            try {
                // 即使白名单，仍使用Function构造限制作用域，避免访问危险全局API
                const result = new Function(`return ${e}`)();
                if (typeof result !== 'number') throw new Error('结果不是数值');
                exprOut.textContent = `结果: ${result}`;
            } catch (err) {
                exprOut.textContent = `计算错误: ${err.message}`;
            }
        };

        /* 修复BUG 4: 数组含null直接访问属性 → 添加非空判断，使用DocumentFragment优化DOM性能 */
        const rows = [{ label: '项 A' }, null, { label: '项 C' }];
        document.getElementById('loadBtn').onclick = function() {
            const ul = document.getElementById('listOut');
            ul.innerHTML = '';
            const fragment = document.createDocumentFragment();
            for (let i = 0; i < rows.length; i++) {
                if (!rows[i]) continue;
                const li = document.createElement('li');
                li.textContent = rows[i].label;
                fragment.appendChild(li);
            }
            ul.appendChild(fragment);
        };

        /* 修复BUG 5: 移除全局吞错误的window.onerror，保留错误调试能力 */

        /* 修复BUG 6: 每次点击都新增setInterval → 保存定时器ID，启动前清除旧定时器
           修复BUG 7: 提醒文案拼接进innerHTML → 使用textContent处理用户输入，避免XSS */
        let remindInterval = null;
        document.getElementById('startRemind').onclick = function() {
            const t = document.getElementById('remindText').value;
            if (remindInterval) {
                clearInterval(remindInterval);
            }
            remindInterval = setInterval(function() {
                const remindBanner = document.getElementById('remindBanner');
                remindBanner.innerHTML = '';
                const strong = document.createElement('strong');
                strong.textContent = '提醒：';
                const textNode = document.createTextNode(t);
                remindBanner.appendChild(strong);
                remindBanner.appendChild(textNode);
            }, 3000);
        };
    </script>
</body>
</html>
