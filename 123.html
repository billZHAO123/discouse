<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="待办事项示例 - 符合最佳实践">
    <title>待办列表</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 24px;
            background: #fafafa;
        }
        .container { max-width: 480px; margin: 0 auto; }
        h1 { font-size: 1.25rem; color: #1a1a1a; }
        .form { display: flex; gap: 8px; margin-bottom: 16px; }
        .form input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        .form button {
            padding: 10px 18px;
            background: #0d6efd;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .form button:hover { background: #0b5ed7; }
        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .todo-item.done .todo-text { text-decoration: line-through; color: #888; }
        .todo-text { flex: 1; }
        .todo-item button {
            padding: 4px 10px;
            font-size: 12px;
            background: #dc3545;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .todo-item button:hover { background: #bb2d3b; }
        .empty-msg { color: #888; text-align: center; padding: 32px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>待办列表</h1>
        <div class="form">
            <input type="text" id="todoInput" placeholder="添加待办" aria-label="待办内容">
            <button type="button" id="addTodo">添加</button>
        </div>
        <ul id="todoList" aria-label="待办列表"></ul>
    </div>

    <script>
        (function() {
            'use strict';

            var todoInput = document.getElementById('todoInput');
            var addTodo = document.getElementById('addTodo');
            var todoList = document.getElementById('todoList');
            var todos = [];

            function createTodoEl(todo, index) {
                var li = document.createElement('li');
                li.className = 'todo-item' + (todo.done ? ' done' : '');
                li.setAttribute('data-index', String(index));

                var label = document.createElement('label');
                label.className = 'todo-text';
                label.appendChild(document.createTextNode(todo.text));

                var checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = todo.done;
                checkbox.setAttribute('aria-label', '完成: ' + todo.text);
                checkbox.addEventListener('change', function() {
                    toggleTodo(index);
                });

                var delBtn = document.createElement('button');
                delBtn.type = 'button';
                delBtn.appendChild(document.createTextNode('删除'));
                delBtn.setAttribute('aria-label', '删除: ' + todo.text);
                delBtn.addEventListener('click', function() {
                    removeTodo(index);
                });

                li.appendChild(checkbox);
                li.appendChild(label);
                li.appendChild(delBtn);
                return li;
            }

            function render() {
                if (!todoList) return;
                todoList.innerHTML = '';
                if (todos.length === 0) {
                    var empty = document.createElement('div');
                    empty.className = 'empty-msg';
                    empty.appendChild(document.createTextNode('暂无待办，添加一条吧'));
                    todoList.appendChild(empty);
                    return;
                }
                todos.forEach(function(todo, i) {
                    var el = createTodoEl(todo, i);
                    todoList.appendChild(el);
                });
            }

            function addTodoItem() {
                var text = (todoInput && todoInput.value) ? todoInput.value.trim() : '';
                if (!text) return;
                todos.push({ text: text, done: false });
                todoInput.value = '';
                todoInput.focus();
                render();
            }

            function toggleTodo(index) {
                var idx = parseInt(index, 10);
                if (idx >= 0 && idx < todos.length) {
                    todos[idx].done = !todos[idx].done;
                    render();
                }
            }

            function removeTodo(index) {
                var idx = parseInt(index, 10);
                if (idx >= 0 && idx < todos.length) {
                    todos.splice(idx, 1);
                    render();
                }
            }

            if (addTodo && todoInput) {
                addTodo.addEventListener('click', addTodoItem);
                todoInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') addTodoItem();
                });
            }

            render();
        })();
    </script>
</body>
</html>
