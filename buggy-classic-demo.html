<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典 BUG 演示（可运行）</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 560px; margin: 0 auto; }
        .box { border: 1px solid #ccc; padding: 16px; margin: 12px 0; border-radius: 8px; }
        input, button { padding: 8px; margin: 4px 0; }
    </style>
</head>
<body>
    <h1>经典 BUG 演示</h1>
    <p>打开即用，修复了常见错误，供代码审查练习。</p>

    <div class="box">
        <h2>欢迎语（XSS 修复）</h2>
        <input type="text" id="nameInput" placeholder="输入昵称">
        <button type="button" id="greetBtn">生成欢迎</button>
        <div id="greetOut"></div>
    </div>

    <div class="box">
        <h2>计算器（== 与类型 修复）</h2>
        <input type="text" id="a" value="5">
        <input type="text" id="b" value="3">
        <button type="button" id="sumBtn">相加</button>
        <div id="sumOut"></div>
    </div>

    <div class="box">
        <h2>安全表达式计算（eval 注入 修复）</h2>
        <input type="text" id="expr" placeholder="输入数字表达式，如 2+3*4">
        <button type="button" id="calcBtn">计算</button>
        <div id="exprOut"></div>
    </div>

    <div class="box">
        <h2>列表数据</h2>
        <button type="button" id="loadBtn">加载列表</button>
        <ul id="listOut"></ul>
    </div>

    <div class="box">
        <h2>定时提醒</h2>
        <input type="text" id="remindText" placeholder="提醒内容（将显示在下方）">
        <button type="button" id="startRemind">启动每 3 秒刷新提醒</button>
        <div id="remindBanner" style="margin-top:8px;min-height:24px;"></div>
    </div>

    <div class="box">
        <h2>排序（默认 sort 修复）</h2>
        <button type="button" id="sortBtn">排序数字</button>
        <div id="sortOut"></div>
    </div>

    <div class="box">
        <h2>分享链接（未编码 修复）</h2>
        <input type="text" id="cityInput" placeholder="城市，可含 & 或 =">
        <button type="button" id="linkBtn">生成链接</button>
        <div id="linkOut" style="word-break:break-all;font-size:12px;"></div>
    </div>

    <div class="box">
        <h2>快捷操作（闭包 修复）</h2>
        <button type="button" class="quickOp">操作 0</button>
        <button type="button" class="quickOp">操作 1</button>
        <button type="button" class="quickOp">操作 2</button>
        <div id="quickOut"></div>
    </div>

    <div class="box">
        <h2>远程校验（Promise 修复）</h2>
        <button type="button" id="fetchBtn">请求校验</button>
        <div id="fetchOut"></div>
    </div>

    <script>
        // 修复BUG 1: XSS → 使用textContent而非innerHTML插入用户输入
        document.getElementById('greetBtn').onclick = function() {
            const n = document.getElementById('nameInput').value;
            const greetOut = document.getElementById('greetOut');
            greetOut.innerHTML = '';
            const p = document.createElement('p');
            p.textContent = `你好，${n}！`;
            greetOut.appendChild(p);
        };

        // 修复BUG 2: 类型转换错误 → 将输入转为数字再比较和相加，使用===替代==
        document.getElementById('sumBtn').onclick = function() {
            const aVal = document.getElementById('a').value;
            const bVal = document.getElementById('b').value;
            const a = Number(aVal);
            const b = Number(bVal);
            if (a === b) {
                document.getElementById('sumOut').textContent = '相等，不计算';
            } else {
                document.getElementById('sumOut').textContent = `结果: ${a + b}`;
            }
        };

        // 修复BUG 3: eval代码注入 → 使用安全的表达式解析仅计算数字表达式
        document.getElementById('calcBtn').onclick = function() {
            const expr = document.getElementById('expr').value;
            const exprOut = document.getElementById('exprOut');
            // 仅允许数字、运算符和括号，过滤所有其他字符
            const sanitized = expr.replace(/[^0-9+\-*/().]/g, '');
            try {
                // 使用Function构造器仍有风险，但这里已经做了严格输入 sanitize，比eval更可控
                const result = new Function(`return ${sanitized}`)();
                if (typeof result !== 'number') throw new Error('非数字结果');
                exprOut.textContent = `结果: ${result}`;
            } catch (e) {
                exprOut.textContent = '错误：请输入合法的数字表达式';
            }
        };

        // 修复BUG 4: 处理null值，避免访问null属性报错
        const rows = [{ label: '项 A' }, null, { label: '项 C' }];
        document.getElementById('loadBtn').onclick = function() {
            const ul = document.getElementById('listOut');
            ul.innerHTML = '';
            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                // 跳过空值或添加占位
                if (!row) continue;
                const li = document.createElement('li');
                li.textContent = row.label;
                ul.appendChild(li);
            }
        };

        // 修复BUG 5: 移除吞掉所有错误的window.onerror，保留错误日志便于调试
        // 原window.onerror = function() { return true; }; 已删除

        // 修复BUG 6: 定时器清理避免叠加 + XSS修复 → 清理旧定时器再创建，使用textContent
        let remindTimer = null;
        document.getElementById('startRemind').onclick = function() {
            const t = document.getElementById('remindText').value;
            // 清理已有定时器，防止多个定时器同时运行
            if (remindTimer !== null) {
                clearInterval(remindTimer);
            }
            remindTimer = setInterval(function() {
                const banner = document.getElementById('remindBanner');
                banner.innerHTML = '';
                const strong = document.createElement('strong');
                strong.textContent = '提醒：';
                banner.appendChild(strong);
                banner.appendChild(document.createTextNode(t));
            }, 3000);
            // 立即显示一次
            const banner = document.getElementById('remindBanner');
            banner.innerHTML = '';
            const strong = document.createElement('strong');
            strong.textContent = '提醒：';
            banner.appendChild(strong);
            banner.appendChild(document.createTextNode(t));
        };

        // 修复BUG 8: 数组排序添加数字比较函数，按数值大小排序
        const nums = [1, 10, 2, 20, 3];
        document.getElementById('sortBtn').onclick = function() {
            const copy = nums.slice();
            // 添加比较函数修复默认字典序排序问题
            copy.sort((a, b) => a - b);
            document.getElementById('sortOut').textContent = copy.join(', ');
        };

        // 修复BUG 9: URL参数使用encodeURIComponent编码，避免破坏参数结构
        document.getElementById('linkBtn').onclick = function() {
            const city = document.getElementById('cityInput').value;
            document.getElementById('linkOut').textContent =
                `https://api.example.com/register?city=${encodeURIComponent(city)}&source=${encodeURIComponent('demo')}`;
        };

        // 修复BUG 10: 闭包错误 → 使用let声明i，为每次循环创建块级作用域
        const quickBtns = document.getElementsByClassName('quickOp');
        for (let i = 0; i < quickBtns.length; i++) {
            quickBtns[i].onclick = function() {
                document.getElementById('quickOut').textContent = `你点击了第 ${i} 个操作`;
            };
        }

        // 修复BUG 11: fetch添加catch错误处理，避免未处理的Promise拒绝
        document.getElementById('fetchBtn').onclick = function() {
            document.getElementById('fetchOut').textContent = '请求中...';
            fetch('https://invalid-host-that-will-fail-xyz.example/no.json')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    document.getElementById('fetchOut').textContent = JSON.stringify(data);
                })
                .catch(function(err) {
                    document.getElementById('fetchOut').textContent = `请求失败: ${err.message}`;
                });
        };
    </script>
</body>
</html>
