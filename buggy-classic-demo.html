<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典 BUG 演示（可运行）</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 560px; margin: 0 auto; }
        .box { border: 1px solid #ccc; padding: 16px; margin: 12px 0; border-radius: 8px; }
        input, button { padding: 8px; margin: 4px 0; }
    </style>
</head>
<body>
    <h1>经典 BUG 演示</h1>
    <p>打开即用，故意埋入常见错误，供代码审查练习。</p>

    <div class="box">
        <h2>欢迎语（XSS）</h2>
        <input type="text" id="nameInput" placeholder="输入昵称">
        <button type="button" id="greetBtn">生成欢迎</button>
        <div id="greetOut"></div>
    </div>

    <div class="box">
        <h2>计算器（== 与类型）</h2>
        <input type="text" id="a" value="5">
        <input type="text" id="b" value="3">
        <button type="button" id="sumBtn">相加</button>
        <div id="sumOut"></div>
    </div>

    <div class="box">
        <h2>脚本执行</h2>
        <input type="text" id="expr" placeholder="输入表达式">
        <button type="button" id="evalBtn">计算</button>
    </div>

    <div class="box">
        <h2>列表数据</h2>
        <button type="button" id="loadBtn">加载列表</button>
        <ul id="listOut"></ul>
    </div>

    <div class="box">
        <h2>定时提醒</h2>
        <input type="text" id="remindText" placeholder="提醒内容（将显示在下方）">
        <button type="button" id="startRemind">启动每 3 秒刷新提醒</button>
        <div id="remindBanner" style="margin-top:8px;min-height:24px;"></div>
    </div>

    <div class="box">
        <h2>排序（默认 sort）</h2>
        <button type="button" id="sortBtn">排序数字</button>
        <div id="sortOut"></div>
    </div>

    <div class="box">
        <h2>分享链接（未编码）</h2>
        <input type="text" id="cityInput" placeholder="城市，可含 & 或 =">
        <button type="button" id="linkBtn">生成链接</button>
        <div id="linkOut" style="word-break:break-all;font-size:12px;"></div>
    </div>

    <div class="box">
        <h2>快捷操作（闭包）</h2>
        <button type="button" class="quickOp">操作 0</button>
        <button type="button" class="quickOp">操作 1</button>
        <button type="button" class="quickOp">操作 2</button>
        <div id="quickOut"></div>
    </div>

    <div class="box">
        <h2>远程校验（Promise）</h2>
        <button type="button" id="fetchBtn">请求校验</button>
        <div id="fetchOut"></div>
    </div>

    <script>
        /* BUG 1: innerHTML + 用户输入 → XSS */
        document.getElementById('greetBtn').onclick = function() {
            var n = document.getElementById('nameInput').value;
            document.getElementById('greetOut').innerHTML = '<p>你好，' + n + '！</p>';
        };

        /* BUG 2: == 导致字符串拼接而非数字相加 */
        document.getElementById('sumBtn').onclick = function() {
            var a = document.getElementById('a').value;
            var b = document.getElementById('b').value;
            if (a == b) {
                document.getElementById('sumOut').textContent = '相等，不计算';
            } else {
                document.getElementById('sumOut').textContent = '结果: ' + (a + b);
            }
        };

        /* BUG 3: eval 执行任意字符串 */
        document.getElementById('evalBtn').onclick = function() {
            var e = document.getElementById('expr').value;
            alert('结果: ' + eval(e));
        };

        /* BUG 4: 数组含 null，直接访问属性 */
        var rows = [{ label: '项 A' }, null, { label: '项 C' }];
        document.getElementById('loadBtn').onclick = function() {
            var ul = document.getElementById('listOut');
            ul.innerHTML = '';
            for (var i = 0; i < rows.length; i++) {
                var li = document.createElement('li');
                li.textContent = rows[i].label;
                ul.appendChild(li);
            }
        };

        /* BUG 5: 全局 onerror 吞掉错误，调试困难 */
        window.onerror = function() { return true; };

        /* BUG 6: setInterval 未 clear，多次叠加；BUG 7: innerHTML + 用户输入 */
        document.getElementById('startRemind').onclick = function() {
            var t = document.getElementById('remindText').value;
            setInterval(function() {
                document.getElementById('remindBanner').innerHTML = '<strong>提醒：</strong>' + t;
            }, 3000);
        };

        /* BUG 8: Array.sort 默认按字符串排，[1,10,2] 顺序错误 */
        var nums = [1, 10, 2, 20, 3];
        document.getElementById('sortBtn').onclick = function() {
            var copy = nums.slice();
            copy.sort();
            document.getElementById('sortOut').textContent = copy.join(', ');
        };

        /* BUG 9: URL 查询参数未 encodeURIComponent，& 会破坏参数 */
        document.getElementById('linkBtn').onclick = function() {
            var city = document.getElementById('cityInput').value;
            document.getElementById('linkOut').textContent =
                'https://api.example.com/register?city=' + city + '&source=demo';
        };

        /* BUG 10: for + var，点击时 i 已是最终值，三个按钮行为一致 */
        var quickBtns = document.getElementsByClassName('quickOp');
        for (var i = 0; i < quickBtns.length; i++) {
            quickBtns[i].onclick = function() {
                document.getElementById('quickOut').textContent = '你点击了第 ' + i + ' 个操作';
            };
        }

        /* BUG 11: fetch 无 catch，失败时未处理且控制台可能报未处理拒绝 */
        document.getElementById('fetchBtn').onclick = function() {
            fetch('https://invalid-host-that-will-fail-xyz.example/no.json')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    document.getElementById('fetchOut').textContent = JSON.stringify(data);
                });
        };
    </script>
</body>
</html>
