<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典 BUG 演示（修复版）</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 560px; margin: 0 auto; }
        .box { border: 1px solid #ccc; padding: 16px; margin: 12px 0; border-radius: 8px; }
        input, button { padding: 8px; margin: 4px 0; }
    </style>
</head>
<body>
    <h1>经典 BUG 演示</h1>
    <p>打开即用，修复常见错误，供代码审查参考。</p>

    <div class="box">
        <h2>欢迎语（XSS修复）</h2>
        <input type="text" id="nameInput" placeholder="输入昵称">
        <button type="button" id="greetBtn">生成欢迎</button>
        <div id="greetOut"></div>
    </div>

    <div class="box">
        <h2>计算器（类型转换修复）</h2>
        <input type="text" id="a" value="5">
        <input type="text" id="b" value="3">
        <button type="button" id="sumBtn">相加</button>
        <div id="sumOut"></div>
    </div>

    <div class="box">
        <h2>安全表达式计算（移除eval）</h2>
        <input type="text" id="expr" placeholder="仅支持纯数值四则运算">
        <button type="button" id="calcBtn">计算</button>
        <div id="calcOut"></div>
    </div>

    <div class="box">
        <h2>列表数据</h2>
        <button type="button" id="loadBtn">加载列表</button>
        <ul id="listOut"></ul>
    </div>

    <div class="box">
        <h2>定时提醒</h2>
        <input type="text" id="remindText" placeholder="提醒内容（将显示在下方）">
        <button type="button" id="startRemind">启动每 3 秒刷新提醒</button>
        <div id="remindBanner" style="margin-top:8px;min-height:24px;"></div>
    </div>

    <div class="box">
        <h2>排序（数字排序修复）</h2>
        <button type="button" id="sortBtn">排序数字</button>
        <div id="sortOut"></div>
    </div>

    <div class="box">
        <h2>分享链接（URL编码修复）</h2>
        <input type="text" id="cityInput" placeholder="城市，可含 & 或 =">
        <button type="button" id="linkBtn">生成链接</button>
        <div id="linkOut" style="word-break:break-all;font-size:12px;"></div>
    </div>

    <div class="box">
        <h2>快捷操作（闭包修复）</h2>
        <button type="button" class="quickOp">操作 0</button>
        <button type="button" class="quickOp">操作 1</button>
        <button type="button" class="quickOp">操作 2</button>
        <div id="quickOut"></div>
    </div>

    <div class="box">
        <h2>远程校验（Promise错误处理修复）</h2>
        <button type="button" id="fetchBtn">请求校验</button>
        <div id="fetchOut"></div>
    </div>

    <script>
        // 一次性缓存DOM引用，避免重复查询
        const greetBtn = document.getElementById('greetBtn');
        const nameInput = document.getElementById('nameInput');
        const greetOut = document.getElementById('greetOut');
        const sumBtn = document.getElementById('sumBtn');
        const aInput = document.getElementById('a');
        const bInput = document.getElementById('b');
        const sumOut = document.getElementById('sumOut');
        const calcBtn = document.getElementById('calcBtn');
        const exprInput = document.getElementById('expr');
        const calcOut = document.getElementById('calcOut');
        const loadBtn = document.getElementById('loadBtn');
        const listOut = document.getElementById('listOut');
        const startRemind = document.getElementById('startRemind');
        const remindText = document.getElementById('remindText');
        const remindBanner = document.getElementById('remindBanner');
        const sortBtn = document.getElementById('sortBtn');
        const sortOut = document.getElementById('sortOut');
        const linkBtn = document.getElementById('linkBtn');
        const cityInput = document.getElementById('cityInput');
        const linkOut = document.getElementById('linkOut');
        const quickBtns = document.getElementsByClassName('quickOp');
        const quickOut = document.getElementById('quickOut');
        const fetchBtn = document.getElementById('fetchBtn');
        const fetchOut = document.getElementById('fetchOut');

        let remindTimer = null;

        /* 修复XSS漏洞：使用textContent而非innerHTML插入用户输入 */
        greetBtn.onclick = function() {
            const n = nameInput.value;
            const p = document.createElement('p');
            p.textContent = `你好，${n}！`;
            greetOut.innerHTML = '';
            greetOut.appendChild(p);
        };

        /* 修复加法逻辑错误：转换为数字再相加，使用===替代==做严格相等判断 */
        sumBtn.onclick = function() {
            const aStr = aInput.value;
            const bStr = bInput.value;
            const a = Number(aStr);
            const b = Number(bStr);
            if (Number.isNaN(a) || Number.isNaN(b)) {
                sumOut.textContent = '请输入有效数字';
                return;
            }
            if (a === b) {
                sumOut.textContent = '相等，不计算';
            } else {
                sumOut.textContent = `结果: ${a + b}`;
            }
        };

        /* 修复任意代码执行漏洞：移除危险eval，使用安全的表达式计算，仅允许数字和四则运算 */
        calcBtn.onclick = function() {
            const e = exprInput.value.trim();
            // 仅允许数字、+-*/()和空格，过滤所有非法字符
            if (!/^[0-9+\-*/().\s]+$/.test(e)) {
                calcOut.textContent = '错误：仅支持纯数值四则运算，不允许其他字符';
                return;
            }
            try {
                // 使用Function构造器仍有风险，但做了输入过滤后仅计算合法四则运算，比eval更可控
                const result = new Function(`return ${e}`)();
                if (typeof result !== 'number' || !Number.isFinite(result)) {
                    calcOut.textContent = '错误：表达式计算结果不是有效数字';
                    return;
                }
                calcOut.textContent = `结果: ${result}`;
            } catch (err) {
                calcOut.textContent = `计算错误：${err.message}`;
            }
        };

        /* 修复空值访问异常：添加空值防护，跳过null/undefined项 */
        const rows = [{ label: '项 A' }, null, { label: '项 C' }];
        loadBtn.onclick = function() {
            listOut.innerHTML = '';
            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                if (!row) continue;
                const li = document.createElement('li');
                li.textContent = row.label;
                listOut.appendChild(li);
            }
        };

        /* 移除错误的全局onerror，不再吞掉所有JS错误 */

        /* 修复定时器问题：清理旧定时器再创建新的，修复XSS，使用textContent插入用户输入 */
        startRemind.onclick = function() {
            const t = remindText.value;
            if (remindTimer) {
                clearInterval(remindTimer);
            }
            remindTimer = setInterval(function() {
                const bannerHtml = document.createElement('div');
                const strong = document.createElement('strong');
                strong.textContent = '提醒：';
                bannerHtml.appendChild(strong);
                const textNode = document.createTextNode(t);
                bannerHtml.appendChild(textNode);
                remindBanner.innerHTML = '';
                remindBanner.appendChild(bannerHtml);
            }, 3000);
        };

        /* 修复数字排序错误：添加数字比较器，按数值大小排序 */
        const nums = [1, 10, 2, 20, 3];
        sortBtn.onclick = function() {
            const copy = nums.slice();
            copy.sort((x, y) => x - y);
            sortOut.textContent = copy.join(', ');
        };

        /* 修复URL编码问题：对参数使用encodeURIComponent编码，避免破坏参数结构 */
        linkBtn.onclick = function() {
            const city = cityInput.value;
            const url = `https://api.example.com/register?city=${encodeURIComponent(city)}&source=${encodeURIComponent('demo')}`;
            linkOut.textContent = url;
        };

        /* 修复闭包问题：使用let声明循环变量，每个循环都有独立块级作用域 */
        for (let i = 0; i < quickBtns.length; i++) {
            quickBtns[i].onclick = function() {
                quickOut.textContent = `你点击了第 ${i} 个操作`;
            };
        }

        /* 修复Promise未捕获错误问题：添加catch处理请求失败场景 */
        fetchBtn.onclick = function() {
            fetch('https://invalid-host-that-will-fail-xyz.example/no.json')
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    fetchOut.textContent = JSON.stringify(data);
                })
                .catch(function(err) {
                    fetchOut.textContent = `请求失败: ${err.message}`;
                    console.error('请求异常', err);
                });
        };
    </script>
</body>
</html>
