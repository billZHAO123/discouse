<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典 BUG 演示（修复版）</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 560px; margin: 0 auto; }
        .box { border: 1px solid #ccc; padding: 16px; margin: 12px 0; border-radius: 8px; }
        input, button { padding: 8px; margin: 4px 0; }
    </style>
</head>
<body>
    <h1>经典 BUG 修复演示</h1>
    <p>这是原BUG演示项目的修复版本，已修复代码审查指出的所有问题</p>

    <div class="box">
        <h2>欢迎语（XSS修复）</h2>
        <input type="text" id="nameInput" placeholder="输入昵称">
        <button type="button" id="greetBtn">生成欢迎</button>
        <div id="greetOut"></div>
    </div>

    <div class="box">
        <h2>计算器（== 与类型修复）</h2>
        <input type="number" id="a" value="5">
        <input type="number" id="b" value="3">
        <button type="button" id="sumBtn">相加</button>
        <div id="sumOut"></div>
    </div>

    <div class="box">
        <h2>安全表达式计算（eval风险修复）</h2>
        <input type="text" id="expr" placeholder="仅支持数字四则运算">
        <button type="button" id="evalBtn">计算</button>
        <div id="exprOut"></div>
    </div>

    <div class="box">
        <h2>列表数据（空值异常修复）</h2>
        <button type="button" id="loadBtn">加载列表</button>
        <ul id="listOut"></ul>
    </div>

    <div class="box">
        <h2>定时提醒（内存泄漏+XSS修复）</h2>
        <input type="text" id="remindText" placeholder="提醒内容（将显示在下方）">
        <button type="button" id="startRemind">启动每 3 秒刷新提醒</button>
        <button type="button" id="stopRemind">停止提醒</button>
        <div id="remindBanner" style="margin-top:8px;min-height:24px;"></div>
    </div>

    <div class="box">
        <h2>排序（默认sort修复）</h2>
        <button type="button" id="sortBtn">排序数字</button>
        <div id="sortOut"></div>
    </div>

    <div class="box">
        <h2>分享链接（未编码修复）</h2>
        <input type="text" id="cityInput" placeholder="城市，可含 & 或 =">
        <button type="button" id="linkBtn">生成链接</button>
        <div id="linkOut" style="word-break:break-all;font-size:12px;"></div>
    </div>

    <div class="box">
        <h2>快捷操作（闭包修复）</h2>
        <button type="button" class="quickOp">操作 0</button>
        <button type="button" class="quickOp">操作 1</button>
        <button type="button" class="quickOp">操作 2</button>
        <div id="quickOut"></div>
    </div>

    <div class="box">
        <h2>远程校验（Promise错误处理修复）</h2>
        <button type="button" id="fetchBtn">请求校验</button>
        <div id="fetchOut"></div>
    </div>

    <script>
        (function() {
            // 缓存DOM引用，避免重复查询
            const greetBtn = document.getElementById('greetBtn');
            const nameInput = document.getElementById('nameInput');
            const greetOut = document.getElementById('greetOut');
            const sumBtn = document.getElementById('sumBtn');
            const aInput = document.getElementById('a');
            const bInput = document.getElementById('b');
            const sumOut = document.getElementById('sumOut');
            const evalBtn = document.getElementById('evalBtn');
            const exprInput = document.getElementById('expr');
            const exprOut = document.getElementById('exprOut');
            const loadBtn = document.getElementById('loadBtn');
            const listOut = document.getElementById('listOut');
            const startRemind = document.getElementById('startRemind');
            const stopRemind = document.getElementById('stopRemind');
            const remindText = document.getElementById('remindText');
            const remindBanner = document.getElementById('remindBanner');
            const sortBtn = document.getElementById('sortBtn');
            const sortOut = document.getElementById('sortOut');
            const linkBtn = document.getElementById('linkBtn');
            const cityInput = document.getElementById('cityInput');
            const linkOut = document.getElementById('linkOut');
            const quickBtns = document.getElementsByClassName('quickOp');
            const quickOut = document.getElementById('quickOut');
            const fetchBtn = document.getElementById('fetchBtn');
            const fetchOut = document.getElementById('fetchOut');

            let remindTimer = null;
            const rows = [{ label: '项 A' }, null, { label: '项 C' }];
            const nums = [1, 10, 2, 20, 3];

            // 1. 修复XSS漏洞：使用textContent替代innerHTML插入用户输入
            greetBtn.addEventListener('click', function() {
                const n = nameInput.value;
                const p = document.createElement('p');
                p.textContent = '你好，' + n + '！';
                greetOut.innerHTML = '';
                greetOut.appendChild(p);
            });

            // 2. 修复类型转换与相等判断错误：转为数字相加，使用===替代==
            sumBtn.addEventListener('click', function() {
                const a = Number(aInput.value);
                const b = Number(bInput.value);
                if (a === b) {
                    sumOut.textContent = '相等，不计算';
                } else {
                    sumOut.textContent = '结果: ' + (a + b);
                }
            });

            // 3. 修复eval任意代码执行风险：仅保留合法数字和四则运算字符后安全计算
            evalBtn.addEventListener('click', function() {
                const expr = exprInput.value;
                // 只允许数字、加减乘除和括号，过滤所有其他字符
                const sanitized = expr.replace(/[^0-9+\-*/().]/g, '');
                try {
                    // 即使 sanitize 后仍避免使用eval，这里使用Function构造器限制作用域
                    const result = new Function('"use strict"; return (' + sanitized + ')')();
                    if (typeof result !== 'number') throw new Error('非数字结果');
                    exprOut.textContent = '结果: ' + result;
                } catch (e) {
                    exprOut.textContent = '计算错误: 仅支持数字四则运算';
                }
            });

            // 4. 修复空值访问异常+性能优化：添加空值判断+使用DocumentFragment批量插入
            loadBtn.addEventListener('click', function() {
                listOut.innerHTML = '';
                const fragment = document.createDocumentFragment();
                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i];
                    if (!row) continue; // 跳过空值
                    const li = document.createElement('li');
                    li.textContent = row.label;
                    fragment.appendChild(li);
                }
                listOut.appendChild(fragment);
            });

            // 移除全局吞错误的onhandler，原BUG5已修复

            // 6、7 修复定时器未清理+XSS漏洞：保存定时器引用，点击时清理旧定时器，使用textContent
            startRemind.addEventListener('click', function() {
                const t = remindText.value;
                if (remindTimer) {
                    clearInterval(remindTimer);
                }
                remindTimer = setInterval(function() {
                    remindBanner.innerHTML = '';
                    const strong = document.createElement('strong');
                    strong.textContent = '提醒：';
                    remindBanner.appendChild(strong);
                    remindBanner.appendChild(document.createTextNode(t));
                }, 3000);
            });

            stopRemind.addEventListener('click', function() {
                if (remindTimer) {
                    clearInterval(remindTimer);
                    remindTimer = null;
                    remindBanner.textContent = '提醒已停止';
                }
            });

            // 8. 修复sort排序错误：添加数字比较回调函数
            sortBtn.addEventListener('click', function() {
                const copy = nums.slice();
                copy.sort((a, b) => a - b);
                sortOut.textContent = copy.join(', ');
            });

            // 9. 修复URL参数未编码问题：使用encodeURIComponent编码用户输入
            linkBtn.addEventListener('click', function() {
                const city = cityInput.value;
                linkOut.textContent =
                    'https://api.example.com/register?city=' + encodeURIComponent(city) + '&source=demo';
            });

            // 10. 修复闭包变量错误：使用let声明循环变量，每个迭代保留独立作用域
            for (let i = 0; i < quickBtns.length; i++) {
                quickBtns[i].addEventListener('click', function() {
                    quickOut.textContent = '你点击了第 ' + i + ' 个操作';
                });
            }

            // 11. 修复fetch未错误处理问题：添加catch捕获异常
            fetchBtn.addEventListener('click', function() {
                fetch('https://invalid-host-that-will-fail-xyz.example/no.json')
                    .then(function(r) {
                        if (!r.ok) throw new Error('请求失败，状态码：' + r.status);
                        return r.json();
                    })
                    .then(function(data) {
                        fetchOut.textContent = JSON.stringify(data);
                    })
                    .catch(function(err) {
                        fetchOut.textContent = '请求失败: ' + err.message;
                    });
            });
        })();
    </script>
</body>
</html>
