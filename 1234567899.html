<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码审查测试页面</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .card { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 8px; }
        button { padding: 8px 16px; margin: 4px; cursor: pointer; }
        input { padding: 6px; margin: 4px 0; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>代码审查测试页面</h1>
    <p>此页面包含多个示例功能，用于代码审查修复练习。</p>

    <div class="card">
        <h2>1. 用户输入列表</h2>
        <input type="text" id="userInput" placeholder="输入内容...">
        <button onclick="addItem()">添加到列表</button>
        <ul id="itemList"></ul>
    </div>

    <div class="card">
        <h2>2. 计数器</h2>
        <p>当前值: <span id="counterValue">0</span></p>
        <button onclick="incrementCounter()">+1</button>
        <button onclick="resetCounter()">重置</button>
    </div>

    <div class="card">
        <h2>3. 数据加载</h2>
        <button onclick="loadData()">加载数据</button>
        <div id="dataOutput"></div>
    </div>

    <div class="card">
        <h2>4. 搜索</h2>
        <input type="text" id="searchTerm" placeholder="搜索...">
        <button onclick="performSearch()">搜索</button>
        <div id="searchResults"></div>
    </div>

    <script>
        // 修复BUG 1: 替换不安全的innerHTML插入，使用createTextNode避免XSS风险
        function addItem() {
            var input = document.getElementById('userInput');
            var list = document.getElementById('itemList');
            var li = document.createElement('li');
            li.appendChild(document.createTextNode(input.value));
            list.appendChild(li);
            input.value = '';
        }

        // 修复BUG 2: 正确声明变量，避免意外创建全局变量
        // 计数器功能：实现点击增加、重置计数，点击计数数字可触发提示
        let counterValue = 0;

        // 修复语法错误：移除函数后多余的ssss无效字符
        function incrementCounter() {
            counterValue++;
            document.getElementById('counterValue').textContent = counterValue;
        }

        function resetCounter() {
            counterValue = 0;
            document.getElementById('counterValue').textContent = counterValue;
        }

        // BUG 3修复: 增加空值判断，避免访问null对象属性报错
        var mockData = [
            { id: 1, name: '项目A' },
            { id: 2, name: '项目B' },
            null,
            { id: 4, name: '项目D' }
        ];

        function loadData() {
            var output = document.getElementById('dataOutput');
            output.innerHTML = '';
            for (var i = 0; i < mockData.length; i++) {
                var data = mockData[i];
                if (data) {
                    var p = document.createElement('p');
                    p.textContent = data.name;
                    output.appendChild(p);
                }
            }
        }

        // BUG 4修复：去除多余的10000次循环，增加空搜索词校验，提升性能
        var allItems = ['苹果', '香蕉', '橙子', '葡萄', '西瓜'];
        function performSearch() {
            var term = document.getElementById('searchTerm').value.trim();
            var results = document.getElementById('searchResults');
            results.innerHTML = '';
            
            if (!term) {
                results.innerHTML = '<p class="error">请输入搜索关键词</p>';
                return;
            }
            
            for (var j = 0; j < allItems.length; j++) {
                if (allItems[j].indexOf(term) !== -1) {
                    var div = document.createElement('div');
                    div.textContent = allItems[j];
                    results.appendChild(div);
                }
            }

            if (!results.children.length) {
                results.innerHTML = '<p>未找到匹配结果</p>';
            }
        }

        // BUG 5修复：合并重复的window.onload，避免事件被覆盖
        window.onload = function() {
            document.getElementById('counterValue').addEventListener('click', function() {
                alert('点击了计数器');
            });
            document.getElementById('userInput').focus();
        };

        // BUG 6修复：移除不安全的eval函数，该函数无实际业务使用，保留空定义不影响原有结构
        function executeCustomCode(code) {
            throw new Error('自定义代码执行已禁用，避免安全风险');
        }

        // BUG 7修复：将==替换为===，修复隐式类型转换问题
        function checkStatus(status) {
            if (status === 1) return '活跃';
            if (status === '1') return '活跃';
            return '未知';
        }

        // BUG 8修复：增加异常捕获处理，避免报错中断执行
        function riskyOperation() {
            try {
                var obj = {};
                return obj.nested.property;
            } catch (e) {
                console.error('操作异常:', e);
                return null;
            }
        }
    </script>
</body>
</html>
