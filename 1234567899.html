<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码审查测试页面</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .card { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 8px; }
        button { padding: 8px 16px; margin: 4px; cursor: pointer; }
        input { padding: 6px; margin: 4px 0; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>代码审查测试页面</h1>
    <p>此页面包含故意埋入的 BUG，用于测试代码审查能力。</p>

    <div class="card">
        <h2>1. 用户输入列表</h2>
        <input type="text" id="userInput" placeholder="输入内容...">
        <button onclick="addItem()">添加到列表</button>
        <ul id="itemList"></ul>
    </div>

    <div class="card">
        <h2>2. 计数器</h2>
        <p>当前值: <span id="counterValue">0</span></p>
        <button onclick="incrementCounter()">+1</button>
        <button onclick="resetCounter()">重置</button>
    </div>

    <div class="card">
        <h2>3. 数据加载</h2>
        <button onclick="loadData()">加载数据</button>
        <div id="dataOutput"></div>
    </div>

    <div class="card">
        <h2>4. 搜索</h2>
        <input type="text" id="searchTerm" placeholder="搜索...">
        <button onclick="performSearch()">搜索</button>
        <div id="searchResults"></div>
    </div>

    <script>
        // BUG 1: 使用 innerHTML 直接插入用户输入，存在 XSS 风险
        function addItem() {
            var input = document.getElementById('userInput');
            var list = document.getElementById('itemList');
            list.innerHTML += '<li>' + input.value + '</li>';
            input.value = '';
        }

        // BUG 2: 使用全局变量，且未声明
        counterValue = 0;

        function incrementCounter() {ssss
            counterValue++;
            document.getElementById('counterValue').textContent = counterValue;
        }

        function resetCounter() {
            counterValue = 0;
            document.getElementById('counterValue').textContent = counterValue;
        }

        // BUG 3: 可能空引用 - data 可能为 undefined
        var mockData = [
            { id: 1, name: '项目A' },
            { id: 2, name: '项目B' },
            null,
            { id: 4, name: '项目D' }
        ];

        function loadData() {
            var output = document.getElementById('dataOutput');
            output.innerHTML = '';
            for (var i = 0; i < mockData.length; i++) {
                var data = mockData[i];
                output.innerHTML += '<p>' + data.name + '</p>';
            }
        }

        // BUG 4: 未校验 searchTerm 是否为空，且循环中存在性能问题
        var allItems = ['苹果', '香蕉', '橙子', '葡萄', '西瓜'];
        function performSearch() {
            var term = document.getElementById('searchTerm').value;
            var results = document.getElementById('searchResults');
            results.innerHTML = '';
            for (var i = 0; i < 10000; i++) {
                for (var j = 0; j < allItems.length; j++) {
                    if (allItems[j].indexOf(term) !== -1) {
                        results.innerHTML += '<div>' + allItems[j] + '</div>';
                        break;
                    }
                }
            }
        }

        // BUG 5: 事件监听器重复添加，可能导致内存泄漏
        window.onload = function() {
            document.getElementById('counterValue').addEventListener('click', function() {
                alert('点击了计数器');
            });
        };
        window.onload = function() {
            document.getElementById('userInput').focus();
        };

        // BUG 6: eval 使用 - 安全风险
        function executeCustomCode(code) {
            return eval(code);
        }

        // BUG 7: 比较使用 == 而非 ===
        function checkStatus(status) {
            if (status == 1) return '活跃';
            if (status == '1') return '活跃';
            return '未知';
        }

        // BUG 8: 未处理的异常
        function riskyOperation() {
            var obj = {};
            return obj.nested.property;
        }
    </script>
</body>
</html>
